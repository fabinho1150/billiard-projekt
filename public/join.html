<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K&Ouml;&Ouml; Billardcafe Wartenummer ziehen</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="join" class="join-body">
    <main class="join-shell glass-card">
      <div class="join-brand">
        <img class="brand-logo-image" src="/assets/logo.png" alt="K&Ouml;&Ouml; Billardcafe Logo" />
        <div>
          <p class="eyebrow">Selbstanmeldung</p>
          <h1>Wartenummer ziehen</h1>
          <p class="lead">Hier wird direkt eine Wartenummer vergeben. Mit dieser Nummer bitte vorne an der Rezeption melden.</p>
        </div>
      </div>

      <section class="join-card">
        <form id="join-form" class="join-form">
          <button type="submit" class="btn btn-primary">Wartenummer ziehen</button>
        </form>
        <p id="join-message" class="message"></p>

        <div id="join-success" class="join-success hidden">
          <div class="join-success-chip">Nummer erfolgreich gezogen</div>
          <div class="join-success-number" id="join-success-number">1</div>
          <div class="join-success-copy" id="join-success-copy">Bitte mit dieser Nummer an der Rezeption melden.</div>
        </div>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
