<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K&Ouml;&Ouml; Billardcafe QR-Anmeldung</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="qr" class="join-body qr-body">
    <main class="join-shell qr-shell glass-card">
      <div class="join-brand qr-brand">
        <img class="brand-logo-image" src="/assets/logo.png" alt="K&Ouml;&Ouml; Billardcafe Logo" />
        <div>
          <p class="eyebrow">QR-Anmeldung</p>
          <h1>Warteliste per Scan</h1>
          <p class="lead">Code scannen, Namen eingeben und direkt auf die Warteliste setzen lassen.</p>
        </div>
      </div>

      <section class="qr-page-card">
        <img
          id="join-qr-image"
          class="join-qr-image qr-page-image"
          alt="QR-Code zur Wartelisten-Anmeldung"
          data-size="420"
        />
        <div id="join-url-label" class="join-url-label qr-page-url">--</div>
        <a class="btn btn-primary qr-page-link" href="/join">Direkt zur Anmeldeseite</a>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
